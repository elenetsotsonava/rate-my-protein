<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title th:text="${(editMode != null and editMode)
            ? 'Edit Review | RateMyProtein'
            : 'Write Review | RateMyProtein'}">
        Write Review | RateMyProtein
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Exo+2:wght@600;700;800&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

    <style>
        body {
            background: #f5f8fc;
            color: #0d1b2e;
        }

        .review-card {
            border: 0;
            border-radius: 18px;
            box-shadow: 0 16px 45px rgba(13, 27, 46, 0.09);
        }
    </style>
</head>

<body>

<nav class="navbar bg-white border-bottom">
    <div class="container py-2">

        <a class="navbar-brand fw-bold"
           th:href="@{/}">
            RateMy<span class="brand-accent">Protein</span>
        </a>

        <a class="btn btn-outline-dark"
           th:href="@{/products/{id}(id=${product.id})}">
            Back to Product
        </a>

    </div>
</nav>

<main class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <section class="card review-card">

                <div class="card-body p-4 p-md-5">

                    <h1 class="h2 fw-bold"
                        th:text="${(editMode != null and editMode)
                                ? 'Edit Your Review'
                                : 'Write a Review'}">
                        Write a Review
                    </h1>

                    <p class="text-secondary mb-4">

                        <span th:text="${product.brand.name}">
                            Brand
                        </span>

                        —

                        <span th:text="${product.name}">
                            Product
                        </span>

                        —

                        <span th:text="${product.flavor.name}">
                            Flavor
                        </span>

                    </p>

                    <form th:action="${(editMode != null and editMode)
                            ? '/reviews/' + reviewId + '/edit'
                            : '/reviews/products/' + product.id}"
                          th:object="${reviewRequest}"
                          method="post"
                          novalidate>

                        <!-- Global errors -->
                        <div th:if="${#fields.hasGlobalErrors()}"
                             class="alert alert-danger">

                            <p th:each="error : ${#fields.globalErrors()}"
                               th:text="${error.defaultMessage}"
                               class="mb-0">
                                Review error
                            </p>

                        </div>

                        <div class="row">

                            <!-- Overall rating -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label"
                                       for="overallRating">
                                    Overall rating
                                </label>

                                <select id="overallRating"
                                        class="form-select"
                                        th:field="*{overallRating}"
                                        th:errorclass="is-invalid">

                                    <option value="">
                                        Select overall rating
                                    </option>

                                    <option value="5">
                                        5 — Excellent
                                    </option>

                                    <option value="4">
                                        4 — Very good
                                    </option>

                                    <option value="3">
                                        3 — Average
                                    </option>

                                    <option value="2">
                                        2 — Poor
                                    </option>

                                    <option value="1">
                                        1 — Very poor
                                    </option>

                                </select>

                                <div class="invalid-feedback"
                                     th:errors="*{overallRating}">
                                    Overall rating is required.
                                </div>

                            </div>

                            <!-- Taste -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label"
                                       for="tasteRating">
                                    Taste
                                </label>

                                <select id="tasteRating"
                                        class="form-select"
                                        th:field="*{tasteRating}"
                                        th:errorclass="is-invalid">

                                    <option value="">
                                        Select taste rating
                                    </option>

                                    <option value="5">5</option>
                                    <option value="4">4</option>
                                    <option value="3">3</option>
                                    <option value="2">2</option>
                                    <option value="1">1</option>

                                </select>

                                <div class="invalid-feedback"
                                     th:errors="*{tasteRating}">
                                    Taste rating is required.
                                </div>

                            </div>

                            <!-- Texture -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label"
                                       for="textureRating">
                                    Texture
                                </label>

                                <select id="textureRating"
                                        class="form-select"
                                        th:field="*{textureRating}"
                                        th:errorclass="is-invalid">

                                    <option value="">
                                        Select texture rating
                                    </option>

                                    <option value="5">5</option>
                                    <option value="4">4</option>
                                    <option value="3">3</option>
                                    <option value="2">2</option>
                                    <option value="1">1</option>

                                </select>

                                <div class="invalid-feedback"
                                     th:errors="*{textureRating}">
                                    Texture rating is required.
                                </div>

                            </div>

                            <!-- Mixability -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label"
                                       for="mixabilityRating">
                                    Mixability
                                </label>

                                <select id="mixabilityRating"
                                        class="form-select"
                                        th:field="*{mixabilityRating}"
                                        th:errorclass="is-invalid">

                                    <option value="">
                                        Select mixability rating
                                    </option>

                                    <option value="5">5</option>
                                    <option value="4">4</option>
                                    <option value="3">3</option>
                                    <option value="2">2</option>
                                    <option value="1">1</option>

                                </select>

                                <div class="invalid-feedback"
                                     th:errors="*{mixabilityRating}">
                                    Mixability rating is required.
                                </div>

                            </div>

                            <!-- Sweetness -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label"
                                       for="sweetnessRating">
                                    Sweetness
                                </label>

                                <select id="sweetnessRating"
                                        class="form-select"
                                        th:field="*{sweetnessRating}"
                                        th:errorclass="is-invalid">

                                    <option value="">
                                        Select sweetness rating
                                    </option>

                                    <option value="5">5</option>
                                    <option value="4">4</option>
                                    <option value="3">3</option>
                                    <option value="2">2</option>
                                    <option value="1">1</option>

                                </select>

                                <div class="invalid-feedback"
                                     th:errors="*{sweetnessRating}">
                                    Sweetness rating is required.
                                </div>

                            </div>

                            <!-- Aftertaste -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label"
                                       for="aftertasteRating">
                                    Aftertaste
                                </label>

                                <select id="aftertasteRating"
                                        class="form-select"
                                        th:field="*{aftertasteRating}"
                                        th:errorclass="is-invalid">

                                    <option value="">
                                        Select aftertaste rating
                                    </option>

                                    <option value="5">5</option>
                                    <option value="4">4</option>
                                    <option value="3">3</option>
                                    <option value="2">2</option>
                                    <option value="1">1</option>

                                </select>

                                <div class="invalid-feedback"
                                     th:errors="*{aftertasteRating}">
                                    Aftertaste rating is required.
                                </div>

                            </div>

                        </div>

                        <!-- Optional written review -->
                        <div class="mb-3">

                            <label class="form-label"
                                   for="reviewText">
                                Your review

                                <span class="text-muted">
                                    (optional)
                                </span>
                            </label>

                            <textarea id="reviewText"
                                      class="form-control"
                                      rows="6"
                                      maxlength="2000"
                                      th:field="*{reviewText}"
                                      th:errorclass="is-invalid"
                                      placeholder="Share more details about your experience if you would like.">
                            </textarea>

                            <div class="invalid-feedback"
                                 th:errors="*{reviewText}">
                                Review text error
                            </div>

                        </div>

                        <!-- Buy again -->
                        <div class="form-check mb-4">

                            <input id="wouldBuyAgain"
                                   class="form-check-input"
                                   type="checkbox"
                                   th:field="*{wouldBuyAgain}">

                            <label class="form-check-label"
                                   for="wouldBuyAgain">
                                I would buy this product again
                            </label>

                        </div>

                        <!-- Actions -->
                        <div class="d-flex flex-wrap gap-2">

                            <button class="btn btn-orange"
                                    type="submit"
                                    th:text="${(editMode != null and editMode)
                                            ? 'Save Changes'
                                            : 'Submit Review'}">
                                Submit Review
                            </button>

                            <a class="btn btn-outline-secondary"
                               th:href="@{/products/{id}(id=${product.id})}">
                                Cancel
                            </a>

                        </div>

                    </form>

                </div>

            </section>

        </div>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
