<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title th:text="${'Review ' + product.name + ' | RateMyProtein'}">
        Write Review | RateMyProtein
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background: #f5f8fc;
            color: #0d1b2e;
        }

        .review-card {
            border: 0;
            border-radius: 18px;
            box-shadow: 0 16px 45px rgba(13, 27, 46, 0.09);
        }

        .btn-orange {
            background: #f97316;
            border-color: #f97316;
            color: white;
        }

        .btn-orange:hover {
            background: #dc5f0b;
            border-color: #dc5f0b;
            color: white;
        }
    </style>
</head>

<body>

<nav class="navbar bg-white border-bottom">
    <div class="container">

        <a class="navbar-brand fw-bold"
           th:href="@{/}">
            RateMyProtein
        </a>

        <a class="btn btn-outline-dark"
           th:href="@{/products/{id}(id=${product.id})}">
            Back to Product
        </a>

    </div>
</nav>

<main class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card review-card">

                <div class="card-body p-4 p-md-5">

                    <h1 class="h2 fw-bold"
                        th:text="${editMode}
            ? 'Edit Your Review'
            : 'Write a Review'">
                        Write a Review
                    </h1>

                    <p class="text-secondary mb-4">
                        <span th:text="${product.brand.name}">
                            Brand
                        </span>

                        —

                        <span th:text="${product.name}">
                            Product
                        </span>

                        —

                        <span th:text="${product.flavor.name}">
                            Flavor
                        </span>
                    </p>

                    <form th:action="${editMode
        ? '/reviews/' + reviewId + '/edit'
        : '/reviews/products/' + product.id}"
                          th:object="${reviewRequest}"
                          method="post"
                          novalidate>

                        <div th:if="${#fields.hasGlobalErrors()}"
                             class="alert alert-danger">

                            <p th:each="error : ${#fields.globalErrors()}"
                               th:text="${error}"
                               class="mb-0">
                                Review error
                            </p>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label"
                                       for="overallRating">
                                    Overall rating
                                </label>

                                <select id="overallRating"
                                        class="form-select"
                                        th:classappend="${#fields.hasErrors('overallRating')}
                                                ? 'is-invalid' : ''"
                                        th:field="*{overallRating}">

                                    <option value="">
                                        Select a rating
                                    </option>

                                    <option value="5">5 — Excellent</option>
                                    <option value="4">4 — Very good</option>
                                    <option value="3">3 — Average</option>
                                    <option value="2">2 — Poor</option>
                                    <option value="1">1 — Very poor</option>
                                </select>

                                <div class="invalid-feedback"
                                     th:errors="*{overallRating}">
                                    Rating error
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label"
                                       for="tasteRating">
                                    Taste
                                </label>

                                <select id="tasteRating"
                                        class="form-select"
                                        th:field="*{tasteRating}">
                                    <option value="">Select a rating</option>
                                    <option value="5">5</option>
                                    <option value="4">4</option>
                                    <option value="3">3</option>
                                    <option value="2">2</option>
                                    <option value="1">1</option>
                                </select>

                                <div class="text-danger small"
                                     th:errors="*{tasteRating}">
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label"
                                       for="textureRating">
                                    Texture
                                </label>

                                <select id="textureRating"
                                        class="form-select"
                                        th:field="*{textureRating}">
                                    <option value="">Select a rating</option>
                                    <option value="5">5</option>
                                    <option value="4">4</option>
                                    <option value="3">3</option>
                                    <option value="2">2</option>
                                    <option value="1">1</option>
                                </select>

                                <div class="text-danger small"
                                     th:errors="*{textureRating}">
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label"
                                       for="mixabilityRating">
                                    Mixability
                                </label>

                                <select id="mixabilityRating"
                                        class="form-select"
                                        th:field="*{mixabilityRating}">
                                    <option value="">Select a rating</option>
                                    <option value="5">5</option>
                                    <option value="4">4</option>
                                    <option value="3">3</option>
                                    <option value="2">2</option>
                                    <option value="1">1</option>
                                </select>

                                <div class="text-danger small"
                                     th:errors="*{mixabilityRating}">
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label"
                                       for="sweetnessRating">
                                    Sweetness
                                </label>

                                <select id="sweetnessRating"
                                        class="form-select"
                                        th:field="*{sweetnessRating}">
                                    <option value="">Select a rating</option>
                                    <option value="5">5</option>
                                    <option value="4">4</option>
                                    <option value="3">3</option>
                                    <option value="2">2</option>
                                    <option value="1">1</option>
                                </select>

                                <div class="text-danger small"
                                     th:errors="*{sweetnessRating}">
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label"
                                       for="aftertasteRating">
                                    Aftertaste
                                </label>

                                <select id="aftertasteRating"
                                        class="form-select"
                                        th:field="*{aftertasteRating}">
                                    <option value="">Select a rating</option>
                                    <option value="5">5</option>
                                    <option value="4">4</option>
                                    <option value="3">3</option>
                                    <option value="2">2</option>
                                    <option value="1">1</option>
                                </select>

                                <div class="text-danger small"
                                     th:errors="*{aftertasteRating}">
                                </div>
                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label"
                                   for="reviewText">
                                Your review
                            </label>

                            <textarea id="reviewText"
                                      class="form-control"
                                      rows="6"
                                      maxlength="2000"
                                      th:classappend="${#fields.hasErrors('reviewText')}
                                              ? 'is-invalid' : ''"
                                      th:field="*{reviewText}">
                            </textarea>

                            <div class="invalid-feedback"
                                 th:errors="*{reviewText}">
                                Review-text error
                            </div>

                        </div>

                        <div class="form-check mb-4">

                            <input id="wouldBuyAgain"
                                   class="form-check-input"
                                   type="checkbox"
                                   th:field="*{wouldBuyAgain}">

                            <label class="form-check-label"
                                   for="wouldBuyAgain">
                                I would buy this product again
                            </label>

                        </div>

                        <button class="btn btn-orange"
                                type="submit"
                                th:text="${editMode}
                ? 'Save Changes'
                : 'Submit Review'">
                            Submit Review
                        </button>

                        <a class="btn btn-outline-secondary"
                           th:href="@{/products/{id}(id=${product.id})}">
                            Cancel
                        </a>

                    </form>

                </div>
            </div>

        </div>
    </div>

</main>

</body>
</html>
