<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Create Account | RateMyProtein</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background: #f5f8fc;
            color: #0d1b2e;
        }

        .registration-card {
            border: 0;
            border-radius: 16px;
        }

        .brand-accent {
            color: #f97316;
        }

        .btn-register {
            background: #f97316;
            border-color: #f97316;
            color: white;
        }

        .btn-register:hover {
            background: #dc5f0b;
            border-color: #dc5f0b;
            color: white;
        }
    </style>
</head>

<body>

<nav class="navbar bg-white border-bottom">
    <div class="container">

        <a class="navbar-brand fw-bold"
           th:href="@{/}">
            RateMy<span class="brand-accent">Protein</span>
        </a>

        <a class="btn btn-outline-dark"
           th:href="@{/products}">
            Browse Products
        </a>

    </div>
</nav>

<main class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-8 col-lg-6">

            <div class="card registration-card shadow-sm">

                <div class="card-body p-4 p-md-5">

                    <h1 class="h2 fw-bold mb-2">
                        Create your account
                    </h1>

                    <p class="text-secondary mb-4">
                        Join RateMyProtein and share your protein
                        flavor experience.
                    </p>

                    <form th:action="@{/register}"
                          th:object="${registrationRequest}"
                          method="post"
                          novalidate>

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label for="firstName"
                                       class="form-label">
                                    First name
                                </label>

                                <input id="firstName"
                                       type="text"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('firstName')}
                                               ? 'is-invalid' : ''"
                                       th:field="*{firstName}"
                                       autocomplete="given-name">

                                <div class="invalid-feedback"
                                     th:errors="*{firstName}">
                                    First-name error
                                </div>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label for="lastName"
                                       class="form-label">
                                    Last name
                                </label>

                                <input id="lastName"
                                       type="text"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('lastName')}
                                               ? 'is-invalid' : ''"
                                       th:field="*{lastName}"
                                       autocomplete="family-name">

                                <div class="invalid-feedback"
                                     th:errors="*{lastName}">
                                    Last-name error
                                </div>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label for="email"
                                   class="form-label">
                                Email
                            </label>

                            <input id="email"
                                   type="email"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('email')}
                                           ? 'is-invalid' : ''"
                                   th:field="*{email}"
                                   autocomplete="email">

                            <div class="invalid-feedback"
                                 th:errors="*{email}">
                                Email error
                            </div>

                        </div>

                        <div class="mb-3">

                            <label for="password"
                                   class="form-label">
                                Password
                            </label>

                            <input id="password"
                                   type="password"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('password')}
                                           ? 'is-invalid' : ''"
                                   th:field="*{password}"
                                   autocomplete="new-password">

                            <div class="invalid-feedback"
                                 th:errors="*{password}">
                                Password error
                            </div>

                        </div>

                        <div class="mb-4">

                            <label for="confirmPassword"
                                   class="form-label">
                                Confirm password
                            </label>

                            <input id="confirmPassword"
                                   type="password"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('confirmPassword')}
                                           ? 'is-invalid' : ''"
                                   th:field="*{confirmPassword}"
                                   autocomplete="new-password">

                            <div class="invalid-feedback"
                                 th:errors="*{confirmPassword}">
                                Confirmation error
                            </div>

                        </div>

                        <button type="submit"
                                class="btn btn-register w-100 py-2">
                            Create Account
                        </button>

                    </form>

                    <p class="text-center mt-4 mb-0">
                        Already have an account?

                        <a th:href="@{/login}">
                            Log in
                        </a>
                    </p>

                </div>
            </div>

        </div>
    </div>

</main>

</body>
</html>
