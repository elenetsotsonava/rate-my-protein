<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Login | RateMyProtein</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Exo+2:wght@600;700;800&display=swap"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        :root {
            --page-background: #f5f8fc;
            --navy: #0d1b2e;
            --orange: #f97316;
            --orange-dark: #dc5f0b;
        }

        body {
            min-height: 100vh;
            background: var(--page-background);
            color: var(--navy);
            font-family: "DM Sans", sans-serif;
        }

        h1,
        .navbar-brand {
            font-family: "Exo 2", sans-serif;
        }

        .brand-accent {
            color: var(--orange);
        }

        .auth-card {
            border: 0;
            border-radius: 18px;
            box-shadow: 0 16px 45px rgba(13, 27, 46, 0.09);
        }

        .form-control {
            min-height: 48px;
            border-radius: 10px;
        }

        .form-control:focus {
            border-color: var(--orange);
            box-shadow: 0 0 0 0.25rem rgba(249, 115, 22, 0.15);
        }

        .btn-orange {
            min-height: 48px;
            background: var(--orange);
            border-color: var(--orange);
            border-radius: 10px;
            color: white;
            font-weight: 600;
        }

        .btn-orange:hover,
        .btn-orange:focus {
            background: var(--orange-dark);
            border-color: var(--orange-dark);
            color: white;
        }

        .auth-link {
            color: var(--orange-dark);
            font-weight: 600;
        }
    </style>
</head>

<body>

<nav class="navbar bg-white border-bottom">
    <div class="container py-2">

        <a class="navbar-brand fw-bold"
           th:href="@{/}">
            RateMy<span class="brand-accent">Protein</span>
        </a>

        <a class="btn btn-outline-dark"
           th:href="@{/products}">
            Browse Products
        </a>

    </div>
</nav>

<main class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-8 col-lg-6 col-xl-5">

            <div class="card auth-card">

                <div class="card-body p-4 p-md-5">

                    <h1 class="fw-bold mb-2">
                        Welcome back
                    </h1>

                    <p class="text-secondary mb-4">
                        Log in to rate and review protein products.
                    </p>

                    <div th:if="${param.registered}"
                         class="alert alert-success">
                        Your account was created successfully.
                        You can now log in.
                    </div>

                    <div th:if="${param.error}"
                         class="alert alert-danger">
                        Incorrect email or password.
                    </div>

                    <div th:if="${param.logout}"
                         class="alert alert-info">
                        You have been logged out.
                    </div>

                    <form th:action="@{/login}"
                          method="post">

                        <div class="mb-3">

                            <label for="email"
                                   class="form-label fw-semibold">
                                Email address
                            </label>

                            <input id="email"
                                   name="email"
                                   type="email"
                                   class="form-control"
                                   required
                                   autocomplete="email">

                        </div>

                        <div class="mb-4">

                            <label for="password"
                                   class="form-label fw-semibold">
                                Password
                            </label>

                            <input id="password"
                                   name="password"
                                   type="password"
                                   class="form-control"
                                   required
                                   autocomplete="current-password">

                        </div>

                        <button type="submit"
                                class="btn btn-orange w-100">
                            Log In
                        </button>

                    </form>

                    <p class="text-center text-secondary mt-4 mb-0">
                        Do not have an account?

                        <a class="auth-link"
                           th:href="@{/register}">
                            Create one
                        </a>
                    </p>

                </div>
            </div>
        </div>
    </div>

</main>

</body>
</html>
