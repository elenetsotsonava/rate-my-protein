<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Login | RateMyProtein</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background: #f5f8fc;
            color: #0d1b2e;
        }

        .login-card {
            border: 0;
            border-radius: 16px;
        }

        .brand-accent {
            color: #f97316;
        }

        .btn-login {
            background: #f97316;
            border-color: #f97316;
            color: white;
        }

        .btn-login:hover {
            background: #dc5f0b;
            border-color: #dc5f0b;
            color: white;
        }
    </style>
</head>

<body>

<nav class="navbar bg-white border-bottom">
    <div class="container">

        <a class="navbar-brand fw-bold"
           th:href="@{/}">
            RateMy<span class="brand-accent">Protein</span>
        </a>

        <a class="btn btn-outline-dark"
           th:href="@{/products}">
            Browse Products
        </a>

    </div>
</nav>

<main class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-7 col-lg-5">

            <div class="card login-card shadow-sm">

                <div class="card-body p-4 p-md-5">

                    <h1 class="h2 fw-bold mb-2">
                        Welcome back
                    </h1>

                    <p class="text-secondary mb-4">
                        Log in to rate and review protein products.
                    </p>

                    <div th:if="${param.registered}"
                         class="alert alert-success">
                        Your account was created successfully.
                        You can now log in.
                    </div>

                    <div th:if="${param.error}"
                         class="alert alert-danger">
                        Incorrect email or password.
                    </div>

                    <div th:if="${param.logout}"
                         class="alert alert-info">
                        You have been logged out.
                    </div>

                    <form th:action="@{/login}"
                          method="post">

                        <div class="mb-3">

                            <label for="email"
                                   class="form-label">
                                Email
                            </label>

                            <input id="email"
                                   name="email"
                                   type="email"
                                   class="form-control"
                                   required
                                   autocomplete="email">

                        </div>

                        <div class="mb-4">

                            <label for="password"
                                   class="form-label">
                                Password
                            </label>

                            <input id="password"
                                   name="password"
                                   type="password"
                                   class="form-control"
                                   required
                                   autocomplete="current-password">

                        </div>

                        <button type="submit"
                                class="btn btn-login w-100 py-2">
                            Log In
                        </button>

                    </form>

                    <p class="text-center mt-4 mb-0">
                        Do not have an account?

                        <a th:href="@{/register}">
                            Create one
                        </a>
                    </p>

                </div>
            </div>

        </div>
    </div>

</main>

</body>
</html>
