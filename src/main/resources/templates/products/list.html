<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Products | RateMyProtein</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            RateMyProtein
        </a>

        <a class="btn btn-outline-light"
           th:href="@{/products}">
            Products
        </a>
    </div>
</nav>

<main class="container py-5">

    <div class="mb-4">
        <h1>Protein Products</h1>
        <p class="text-muted">
            Explore protein supplements by brand and flavor.
        </p>
    </div>

    <div th:if="${#lists.isEmpty(products)}"
         class="alert alert-info">
        No products are currently available.
    </div>

    <div class="row g-4"
         th:unless="${#lists.isEmpty(products)}">

        <div class="col-md-6 col-lg-4"
             th:each="product : ${products}">

            <article class="card h-100 shadow-sm">

                <div class="card-body">

                    <span class="badge text-bg-secondary mb-2"
                          th:text="${product.proteinType}">
                        WHEY
                    </span>

                    <h2 class="h5 card-title"
                        th:text="${product.name}">
                        Product name
                    </h2>

                    <p class="mb-1">
                        <strong>Brand:</strong>
                        <span th:text="${product.brand.name}">
                            Brand name
                        </span>
                    </p>

                    <p class="mb-1">
                        <strong>Flavor:</strong>
                        <span th:text="${product.flavor.name}">
                            Flavor name
                        </span>
                    </p>

                    <p class="mb-1">
                        <strong>Protein:</strong>
                        <span th:text="${product.proteinPerServing}">
                            24
                        </span>
                        g per serving
                    </p>

                    <p class="mb-3">
                        <strong>Calories:</strong>
                        <span th:text="${product.calories}">
                            120
                        </span>
                    </p>

                    <p class="card-text text-muted"
                       th:text="${product.description}">
                        Product description
                    </p>
                </div>

                <div class="card-footer bg-white">

                    <div class="d-flex justify-content-between align-items-center">

                        <strong th:text="|₾${product.price}|">
                            ₾149.90
                        </strong>

                        <span th:if="${product.stockQuantity > 0}"
                              class="badge text-bg-success">
                            In stock
                        </span>

                        <span th:unless="${product.stockQuantity > 0}"
                              class="badge text-bg-danger">
                            Out of stock
                        </span>

                    </div>
                </div>

            </article>
        </div>
    </div>

</main>

</body>
</html>
