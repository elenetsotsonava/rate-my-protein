<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <title>Page Not Found | RateMyProtein</title>

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Exo+2:wght@600;700;800&display=swap"
          rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          th:href="@{/css/style.css}">
</head>

<body>

<main class="error-page container">

    <section class="app-card error-card">

        <div class="error-code">
            404
        </div>

        <span class="section-label">
            Page not found
        </span>

        <h1 class="display-6 fw-bold mt-3">
            We could not find that page
        </h1>

        <p class="text-muted-custom mb-4">
            The address may be incorrect, or the requested page may no
            longer exist.
        </p>

        <div class="d-flex flex-column flex-sm-row
                    justify-content-center gap-3">

            <a class="btn btn-orange"
               th:href="@{/}">
                Go to Home
            </a>

            <a class="btn btn-outline-dark"
               th:href="@{/products}">
                Browse Products
            </a>

        </div>

    </section>

</main>

</body>
</html>
